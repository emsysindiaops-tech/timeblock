<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Block Tracker</title>
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --surface-quiet: #f3f3f1;
    --border: rgba(20,20,18,0.09);
    --border-quiet: rgba(20,20,18,0.06);
    --text: #16181a;
    --text-muted: #8c8f89;
    --text-faint: #b7b9b3;
    --accent: #2f6f5e;
    --accent-soft: rgba(47,111,94,0.10);
    --accent-border: rgba(47,111,94,0.22);
    --meter-bg: #e7e6e1;
    --mono: ui-monospace, 'SF Mono', 'Cascadia Code', 'Courier New', monospace;
    --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
  }
  [data-theme="dark"] {
      --bg: #0c0e0d;
      --surface: #17191a;
      --surface-quiet: #131514;
      --border: rgba(255,255,255,0.08);
      --border-quiet: rgba(255,255,255,0.05);
      --text: #edefec;
      --text-muted: #7a7d77;
      --text-faint: #4b4d49;
      --accent: #6fc6ae;
      --accent-soft: rgba(111,198,174,0.10);
      --accent-border: rgba(111,198,174,0.24);
      --meter-bg: #232624;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.25rem 1.1rem;
    -webkit-font-smoothing: antialiased;
  }

  .root {
    width: min(560px, 100%);
    position: relative;
  }

  .theme-toggle {
    position: absolute;
    top: -0.35rem;
    right: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--accent-border); }
  .theme-toggle svg { width: 15px; height: 15px; }
  .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: block; }

  /* ---------- Clock ---------- */
  .top { text-align: center; margin-bottom: 2rem; }
  .clock {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: clamp(2.7rem, 9vw, 3.6rem);
    font-weight: 600;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .dateline {
    margin-top: 9px;
    font-size: 0.66rem;
    letter-spacing: 2.5px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ---------- Eyebrow labels ---------- */
  .eyebrow {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.62rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .eyebrow.is-accent { color: var(--accent); }
  .eyebrow-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor; flex-shrink: 0;
  }
  .eyebrow-dot.is-live { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }
  @media (prefers-reduced-motion: reduce) {
    .eyebrow-dot.is-live { animation: none; }
  }

  /* ---------- Now card ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
  }

  .now-card { padding: 1.6rem 1.7rem 1.5rem; }

  .now-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1.3rem;
  }
  .now-block {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: clamp(2.4rem, 8vw, 3.1rem);
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1;
  }
  .now-range {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* Segmented block meter — one tick per minute, the block's real unit */
  .meter {
    display: flex;
    gap: 3px;
    height: 22px;
  }
  .meter-seg {
    flex: 1;
    background: var(--meter-bg);
    border-radius: 4px;
    overflow: hidden;
  }
  .meter-seg-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.9s linear;
  }

  .meter-meta {
    margin-top: 10px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .meter-meta-pct {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text-muted);
  }
  .meter-meta-left {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
  }

  /* ---------- Punch section ---------- */
  .section-label {
    font-size: 0.62rem;
    letter-spacing: 2px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin: 1.6rem 0 0.65rem 4px;
  }

  .punch-card {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .punch-col {
    padding: 1.35rem 1.5rem;
  }
  .punch-col + .punch-col {
    border-left: 1px solid var(--border-quiet);
  }
  @media (max-width: 420px) {
    .punch-card { grid-template-columns: 1fr; }
    .punch-col + .punch-col {
      border-left: none;
      border-top: 1px solid var(--border-quiet);
    }
  }

  .punch-range {
    margin-top: 0.7rem;
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-size: clamp(1.7rem, 6vw, 2.05rem);
    font-weight: 700;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .punch-col.is-now .punch-range { color: var(--accent); }
  .punch-col.is-next .punch-range { color: var(--text-faint); }
  [data-theme="dark"] .punch-col.is-next .punch-range { color: var(--text-muted); }

  .punch-dash { color: var(--text-faint); font-size: 1rem; font-weight: 500; }

  .punch-caption {
    margin-top: 0.6rem;
    font-size: 0.72rem;
    color: var(--text-muted);
  }
  .punch-caption b {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
    font-weight: 700;
    color: var(--text);
    font-size: 0.85rem;
  }

  /* ---------- Footer ---------- */
  .footer {
    text-align: center;
    margin-top: 1.6rem;
    font-size: 0.6rem;
    letter-spacing: 2px;
    color: var(--text-faint);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="root">
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>

  <div class="top">
    <div class="clock" id="clock">--:--:--</div>
    <div class="dateline" id="dateline">— — —</div>
  </div>

  <!-- Current block -->
  <div class="card now-card">
    <div class="now-head">
      <div>
        <div class="eyebrow is-accent"><span class="eyebrow-dot is-live"></span>Live block</div>
        <div class="now-block" id="currentBlock">--</div>
      </div>
      <div class="now-range" id="currentRange">--:-- – --:--</div>
    </div>

    <div class="meter" id="blockMeter"></div>

    <div class="meter-meta">
      <span class="meter-meta-pct" id="progressPct">0% elapsed</span>
      <span class="meter-meta-left" id="timeLeft">--m --s left</span>
    </div>
  </div>

  <div class="section-label">Punch windows</div>

  <div class="card punch-card">
    <div class="punch-col is-now">
      <div class="eyebrow">Now</div>
      <div class="punch-range">
        <span id="punchA">--</span><span class="punch-dash">–</span><span id="punchB">--</span>
      </div>
      <div class="punch-caption">offset <b id="offsetUsed">--</b></div>
    </div>
    <div class="punch-col is-next">
      <div class="eyebrow">Next</div>
      <div class="punch-range">
        <span id="nextPunchA">--</span><span class="punch-dash">–</span><span id="nextPunchB">--</span>
      </div>
      <div class="punch-caption">opens in <b id="nextPunchIn">--</b></div>
    </div>
  </div>

  <div class="footer">15‑min cycle &middot; resets 00:00 &middot; updates live</div>
</div>

<script>
  function pad(n){ return n.toString().padStart(2,'0'); }

  function punchOffsetFor(endMinuteOfHour){
    return (endMinuteOfHour === 15 || endMinuteOfHour === 45) ? 6 : 7;
  }

  // Build the 15 static minute-segments once.
  const meterEl = document.getElementById('blockMeter');
  const segFills = [];
  for (let i = 0; i < 15; i++){
    const seg = document.createElement('div');
    seg.className = 'meter-seg';
    const fill = document.createElement('div');
    fill.className = 'meter-seg-fill';
    seg.appendChild(fill);
    meterEl.appendChild(seg);
    segFills.push(fill);
  }

  function update(){
    const now = new Date();
    document.getElementById('clock').textContent =
      pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
    document.getElementById('dateline').textContent =
      now.toLocaleDateString(undefined, { weekday:'long', day:'2-digit', month:'long', year:'numeric' });

    const mins = now.getHours() * 60 + now.getMinutes();
    const secs = now.getSeconds();
    const blockIdx = Math.floor(mins / 15);
    const blockNum = blockIdx + 1;
    const startMin = blockIdx * 15;
    const endMin = startMin + 15;
    const sH = Math.floor(startMin / 60) % 24, sM = startMin % 60;
    const eH = Math.floor(endMin / 60) % 24, eM = endMin % 60;

    document.getElementById('currentBlock').textContent = blockNum;
    document.getElementById('currentRange').textContent =
      pad(sH) + ':' + pad(sM) + ' – ' + pad(eH) + ':' + pad(eM);

    const elapsedSecs = (mins - startMin) * 60 + secs;
    const pct = Math.round((elapsedSecs / 900) * 100);
    const mLeft = Math.floor((900 - elapsedSecs) / 60);
    const sLeft = (900 - elapsedSecs) % 60;

    const minuteIdx = Math.floor(elapsedSecs / 60);
    const secIntoMinute = elapsedSecs % 60;
    for (let i = 0; i < 15; i++){
      let fillPct = 0;
      if (i < minuteIdx) fillPct = 100;
      else if (i === minuteIdx) fillPct = (secIntoMinute / 60) * 100;
      segFills[i].style.width = fillPct + '%';
    }

    document.getElementById('progressPct').textContent = pct + '% elapsed';
    document.getElementById('timeLeft').textContent = mLeft + 'm ' + pad(sLeft) + 's left';

    // Current punch window
    const offset = punchOffsetFor(eM);
    document.getElementById('punchA').textContent = blockNum + offset;
    document.getElementById('punchB').textContent = blockNum + offset + 1;
    document.getElementById('offsetUsed').textContent = '+' + offset;

    // Upcoming punch window
    const nextBlockIdx = blockIdx + 1;
    const nextBlockNum = nextBlockIdx + 1;
    const nextEndMin = (nextBlockIdx * 15) + 15;
    const nextEM = nextEndMin % 60;
    const nextOffset = punchOffsetFor(nextEM);
    document.getElementById('nextPunchA').textContent = nextBlockNum + nextOffset;
    document.getElementById('nextPunchB').textContent = nextBlockNum + nextOffset + 1;
    document.getElementById('nextPunchIn').textContent = mLeft + 'm ' + pad(sLeft) + 's';
  }

  update();
  setInterval(update, 1000);

  const root = document.documentElement;
  const toggleBtn = document.getElementById('themeToggle');
  let theme = 'light';
  toggleBtn.addEventListener('click', () => {
    theme = theme === 'light' ? 'dark' : 'light';
    if (theme === 'dark') {
      root.setAttribute('data-theme', 'dark');
    } else {
      root.removeAttribute('data-theme');
    }
  });
</script>

</body>
</html>
